# =============================================================================
# Docker Compose for Cirtesu Docker workspaces
# =============================================================================
# Profiles:
#   docker compose --profile ros2-dev-profile up -d  # ROS2 dev only
#   docker compose --profile ros2-da3-dev-profile up -d  # ROS2 + DA3 dev
#   docker compose build ros2-dev                    # Build ROS2 dev directly
#   docker compose run --rm ros2-dev bash            # Enter ROS2 dev container
#
# All services:
#   - Run as your host user (UID/GID match → no permission issues)
#   - Full GPU passthrough + NVIDIA OpenGL
#   - Host network for ROS2 DDS discovery
#   - X11 display forwarding for GUIs (rviz2, rqt, etc.)
#   - Device access for cameras and hardware
# =============================================================================

# ENVIRONMENT VARIABLES
x-common-env: &common-env
  DISPLAY: ${DISPLAY}
  XAUTHORITY: /tmp/.Xauthority
  __GLX_VENDOR_LIBRARY_NAME: nvidia
  __NV_PRIME_RENDER_OFFLOAD: 1

# VOLUMES (SHARED DIRECTORIES)
x-common-volumes: &common-volumes
  - ${MAIN_MOUNT_VOLUME}:${CONTAINER_WORKSPACE}
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - ${HOME}/.Xauthority:/tmp/.Xauthority:ro
  - /dev:/dev

# BUILD ARGS (USED IN DOCKERFILE)
x-common-build-args: &common-build-args
  USERNAME: ${CONTAINER_USER}
  USER_UID: ${CONTAINER_UID}
  USER_GID: ${CONTAINER_GID}

# DEPLOY CONFIG
x-common-service: &common-service
  environment: *common-env
  volumes: *common-volumes
  network_mode: host
  ipc: host
  privileged: true
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu, compute, utility, graphics, display]
  stdin_open: true
  tty: true
  working_dir: ${CONTAINER_WORKSPACE}
  command: bash

# =============================================================================
# Services
# =============================================================================
services:

  # ── Base ROS2 development ──────────────────────────────────────────────────
  ros2-dev:
    image: diegomarza/ros2-dev-base:latest
    build:
      context: ./ros2-dev-base
      dockerfile: Dockerfile
      args: *common-build-args
    container_name: ros2-dev
    profiles: ["ros2-dev-profile"]
    <<: *common-service

  # ── ROS2 + Depth Anything 3 development ────────────────────────────────────
  ros2-da3-dev:
    image: diegomarza/ros2-da3-dev:latest
    build:
      context: ./ros2-da3-dev
      dockerfile: Dockerfile
      additional_contexts:
        depth_anything_3: ${DEPTH_ANYTHING_3_CONTEXT}
      args: *common-build-args
    container_name: ros2-da3-dev
    profiles: ["ros2-da3-dev-profile"]
    <<: *common-service

